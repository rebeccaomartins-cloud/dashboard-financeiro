  const firebaseConfig = {

<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useMemo,useEffect,useRef}=React;

const waitFb=()=>new Promise(res=>{if(window._fbReady)return res();window.addEventListener("fbready",res,{once:true});});
const loadAll=async()=>{await waitFb();return window._fbLoad?window._fbLoad():null;};
const saveAll=async(data)=>{await waitFb();if(window._fbSave)window._fbSave(data);};

const C={bg:"#FDF0F3",surface:"#FFFFFF",surfaceAlt:"#FFF5F7",border:"#F2D4DC",borderLight:"#FAE8EC",accent:"#D96B8A",accentLight:"#F4A7BC",accentPale:"#FDEEF2",green:"#5A9E7C",greenPale:"#EAF5EE",red:"#D96B6B",redPale:"#FDEAEA",yellow:"#C9924A",yellowPale:"#FDF3E7",purple:"#9B7EC8",purplePale:"#F3EDFB",blue:"#4A90C8",bluePale:"#EAF2FB",text:"#3A2A30",textMid:"#7A5F68",muted:"#B8969F",white:"#FFFFFF"};
const MONTHS=["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
const BANKS=["Nubank","Itaú","Bradesco","Santander","C6 Bank","Inter","Sicredi","Caixa","BB","XP","Outro"];
const BANK_COLORS={Nubank:"#820AD1",Itaú:"#EC7000","C6 Bank":"#555555",Inter:"#FF6600",Bradesco:"#CC092F",Santander:"#EC0000",Sicredi:"#00925A",Caixa:"#005CA9",BB:"#E8A800",XP:"#222222",Outro:"#D96B8A"};

// ID especial para transferências — nunca entra em resumos de gasto
const CAT_TRANSF="__transferencia__";

const fmt=v=>new Intl.NumberFormat("pt-BR",{style:"currency",currency:"BRL"}).format(v||0);
const fmtDate=d=>{if(!d)return"";return new Date(d+"T12:00:00").toLocaleDateString("pt-BR");};
const getCiclo=(mi,year)=>{const start=new Date(year,mi,15);const em=mi===11?0:mi+1,ey=mi===11?year+1:year;return{start,end:new Date(ey,em,14)};};
const dateInCiclo=(ds,mi,year)=>{if(!ds)return false;const d=new Date(ds+"T12:00:00"),{start,end}=getCiclo(mi,year);return d>=start&&d<=end;};
// Remove transferências dos cálculos de gasto/receita
const semTransf=list=>list.filter(e=>e.categoriaId!==CAT_TRANSF);

// Parser CSV
const parseCSVLines=(raw)=>{
  const anoAtual=new Date().getFullYear();
  const lines=raw.trim().split("\n").filter(Boolean);
  const countChar=(s,c)=>(s.match(new RegExp("\\"+c,"g"))||[]).length;
  const semis=lines.map(l=>countChar(l,";"));
  const avgSemi=semis.reduce((a,b)=>a+b,0)/lines.length;
  const hasDotDecimal=lines.some(l=>/\d\.\d{2}(,|$|\r)/.test(l));
  const commas=lines.map(l=>countChar(l,","));
  const avgComma=commas.reduce((a,b)=>a+b,0)/lines.length;
  const sep=(avgSemi>=1)?";":(hasDotDecimal&&avgComma>=1)?",":";";
  const parseVal=(s)=>{if(!s||!s.trim())return null;s=s.trim().replace(/^R\$\s*/,"");if(/\d,\d{2}$/.test(s))return parseFloat(s.replace(/\./g,"").replace(",","."));return parseFloat(s.replace(/,/g,""));};
  const isDate=(s)=>/^\d{1,2}\/\d{1,2}(\/\d{2,4})?$/.test(s)||/^\d{4}-\d{2}-\d{2}$/.test(s);
  const toIso=(s)=>{if(/^\d{4}-\d{2}-\d{2}$/.test(s))return s;const p=s.split("/");if(p.length===3){const y=p[2].length===2?"20"+p[2]:p[2];return`${y}-${p[1].padStart(2,"0")}-${p[0].padStart(2,"0")}`;}if(p.length===2){const m=parseInt(p[1]),mesAtual=new Date().getMonth()+1;const y=m>mesAtual?anoAtual-1:anoAtual;return`${y}-${p[1].padStart(2,"0")}-${p[0].padStart(2,"0")}`;}return null;};
  return lines.map(line=>{
    const cols=line.split(sep).map(c=>c.trim().replace(/^"|"$/g,""));
    let data="",descricao="",valor=0;
    for(const c of cols){if(isDate(c)){const iso=toIso(c);if(iso){data=iso;break;}}}
    const numCols=cols.map((c,i)=>({i,v:parseVal(c)})).filter(x=>x.v!==null&&!isNaN(x.v));
    if(numCols.length>0){valor=numCols[numCols.length-1].v;}
    const valorIdx=numCols.length>0?numCols[numCols.length-1].i:-1;
    const desc=cols.filter((c,i)=>!isDate(c)&&i!==valorIdx&&c.length>1);
    descricao=desc.sort((a,b)=>b.length-a.length)[0]||"";
    return data?{id:Date.now()+Math.random(),data,descricao,valor,categoriaId:"",subcategoriaId:"",bancoId:"",transferenciaParaId:""}:null;
  }).filter(Boolean);
};

const Card=({children,style={}})=><div style={{background:C.surface,border:`1.5px solid ${C.border}`,borderRadius:16,padding:20,...style}}>{children}</div>;
const Badge=({color,bg,children})=><span style={{display:"inline-block",padding:"2px 9px",borderRadius:99,fontSize:11,fontWeight:700,background:bg||color+"22",color,whiteSpace:"nowrap"}}>{children}</span>;
const STitle=({children,right})=><div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"16px 18px 10px"}}><span style={{fontSize:13,fontWeight:800}}>{children}</span>{right&&<span>{right}</span>}</div>;
const ProgressBar=({value,max,color})=>{const pct=max>0?Math.min((value/max)*100,100):0;const bc=pct>100?C.red:pct>85?C.yellow:color||C.green;return<div style={{background:C.borderLight,borderRadius:99,height:7,overflow:"hidden",minWidth:80}}><div style={{width:`${Math.max(pct,0)}%`,height:"100%",background:bc,borderRadius:99,transition:"width .4s ease"}}/></div>;};
const KPI=({label,value,color,sub,icon})=>(<Card style={{flex:1,minWidth:155}}><div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>{icon&&<span style={{fontSize:18}}>{icon}</span>}<span style={{fontSize:10.5,color:C.muted,fontWeight:700,textTransform:"uppercase",letterSpacing:".07em"}}>{label}</span></div><div style={{fontSize:21,fontWeight:800,fontFamily:"'DM Mono',monospace",color:color||C.text,letterSpacing:"-.02em"}}>{value}</div>{sub&&<div style={{fontSize:11,color:C.muted,marginTop:5,fontWeight:500}}>{sub}</div>}</Card>);
const Btn=({children,onClick,variant="primary",style={},disabled})=>{const vs={primary:{background:`linear-gradient(135deg,${C.accent},${C.accentLight})`,color:C.white,border:"none",boxShadow:"0 2px 8px #D96B8A33"},ghost:{background:C.surfaceAlt,color:C.textMid,border:`1.5px solid ${C.border}`},success:{background:C.greenPale,color:C.green,border:`1.5px solid ${C.green}55`},soft:{background:C.accentPale,color:C.accent,border:`1.5px solid ${C.accentLight}`},danger:{background:C.redPale,color:C.red,border:`1.5px solid ${C.red}55`}};return<button onClick={onClick} disabled={disabled} style={{padding:"8px 16px",borderRadius:10,fontSize:13,fontWeight:700,cursor:disabled?"not-allowed":"pointer",opacity:disabled?0.5:1,display:"inline-flex",alignItems:"center",gap:6,...vs[variant],...style}}>{children}</button>;};
const Inp=({label,value,onChange,type="text",placeholder,style={}})=>(<div style={{display:"flex",flexDirection:"column",gap:4,...style}}>{label&&<label style={{fontSize:10.5,color:C.muted,fontWeight:700,textTransform:"uppercase",letterSpacing:".07em"}}>{label}</label>}<input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} style={{background:C.surfaceAlt,border:`1.5px solid ${C.border}`,borderRadius:10,color:C.text,padding:"8px 13px",fontSize:13,outline:"none",fontWeight:500}}/></div>);
const Sel=({label,value,onChange,options,placeholder,style={}})=>(<div style={{display:"flex",flexDirection:"column",gap:4,...style}}>{label&&<label style={{fontSize:10.5,color:C.muted,fontWeight:700,textTransform:"uppercase",letterSpacing:".07em"}}>{label}</label>}<select value={value} onChange={e=>onChange(e.target.value)} style={{background:C.surfaceAlt,border:`1.5px solid ${C.border}`,borderRadius:10,color:value?C.text:C.muted,padding:"8px 13px",fontSize:13,outline:"none",fontWeight:500,cursor:"pointer"}}>{placeholder&&<option value="">{placeholder}</option>}{options.map(o=><option key={o.value} value={o.value}>{o.label}</option>)}</select></div>);

// CatSelect com subcategorias e transferência
const CatSelect=({catId,subId,onCat,onSub,categorias,tipoFiltro})=>{
  const cat=categorias.find(c=>c.id===catId);
  const isTransf=catId===CAT_TRANSF;
  const opts=tipoFiltro?categorias.filter(c=>c.tipo===tipoFiltro):categorias;
  const cor=isTransf?C.blue:cat?cat.cor:null;
  const subs=cat?.subcategorias||[];
  return(<div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
    <select value={catId} onChange={e=>{onCat(e.target.value);onSub("");}} style={{background:cor?cor+"22":C.surfaceAlt,border:`1.5px solid ${cor?cor+"88":C.border}`,borderRadius:8,color:cor||C.muted,padding:"3px 10px",fontSize:12,outline:"none",cursor:"pointer",fontWeight:600}}>
      <option value="">— categoria —</option>
      <option value={CAT_TRANSF}>↔ Transferência</option>
      {opts.map(c=><option key={c.id} value={c.id}>{c.tipo==="receita"?"↑":"↓"} {c.nome}</option>)}
    </select>
    {subs.length>0&&!isTransf&&(<select value={subId||""} onChange={e=>onSub(e.target.value)} style={{background:C.surfaceAlt,border:`1.5px solid ${C.border}`,borderRadius:8,color:subId?C.text:C.muted,padding:"3px 10px",fontSize:12,outline:"none",cursor:"pointer"}}>
      <option value="">— subcategoria —</option>
      {subs.map(s=><option key={s.id} value={s.id}>{s.nome}</option>)}
    </select>)}
  </div>);
};

// ── TAB ANUAL — usa apenas extrato, sem fatura, sem transferências ──────────
function TabAnual({extrato,categorias,saldoTotal,calcSaldoBanco,bancos,ano}){
  const meses=MONTHS.map((nome,mi)=>{
    const ext=semTransf(extrato.filter(e=>dateInCiclo(e.data,mi,ano)));
    const receitas=ext.filter(e=>categorias.find(c=>c.id===e.categoriaId)?.tipo==="receita").reduce((s,e)=>s+Math.abs(e.valor),0);
    const despesas=ext.filter(e=>{const c=categorias.find(c=>c.id===e.categoriaId);return!c||c.tipo==="despesa";}).reduce((s,e)=>s+Math.abs(e.valor),0);
    return{nome,mi,receitas,despesas,saldo:receitas-despesas};
  });
  const totalR=meses.reduce((s,m)=>s+m.receitas,0),totalD=meses.reduce((s,m)=>s+m.despesas,0);
  const maxR=Math.max(...meses.map(m=>m.receitas),1),maxD=Math.max(...meses.map(m=>m.despesas),1);
  return(<div style={{display:"flex",flexDirection:"column",gap:20}}>
    <div style={{display:"flex",gap:14,flexWrap:"wrap"}}>
      <KPI icon="💰" label="Saldo Total" value={fmt(saldoTotal)} color={saldoTotal>=0?C.green:C.red}/>
      <KPI icon="🌱" label={`Receitas ${ano}`} value={fmt(totalR)} color={C.green}/>
      <KPI icon="🌸" label={`Despesas ${ano}`} value={fmt(totalD)} color={C.red}/>
      <KPI icon="✨" label={`Resultado ${ano}`} value={fmt(totalR-totalD)} color={totalR>=totalD?C.green:C.red} sub={totalR>=totalD?"no azul ✓":"no vermelho ✗"}/>
    </div>
    {bancos.length>0&&(<div style={{display:"flex",gap:12,flexWrap:"wrap"}}>{bancos.map(b=>{const bc=BANK_COLORS[b.banco]||C.accent;const sal=calcSaldoBanco[b.id]||0;return(<div key={b.id} style={{background:C.surface,border:`1.5px solid ${C.border}`,borderRadius:14,padding:"14px 18px",flex:1,minWidth:160,position:"relative",overflow:"hidden"}}><div style={{position:"absolute",top:0,left:0,right:0,height:4,background:bc}}/><div style={{fontSize:10.5,color:C.muted,fontWeight:700,textTransform:"uppercase",letterSpacing:".07em",marginBottom:2}}>{b.banco}</div><div style={{fontSize:12,fontWeight:800,marginBottom:6,color:C.textMid}}>{b.nome}</div><div style={{fontSize:9,color:C.muted,marginBottom:2}}>Saldo inicial: {fmt(b.saldoInicial||0)}</div><div style={{fontSize:18,fontFamily:"'DM Mono',monospace",fontWeight:800,color:sal>=0?C.green:C.red}}>{fmt(sal)}</div><div style={{fontSize:10,color:C.muted,marginTop:2}}>saldo atual</div></div>);})}</div>)}
    <Card>
      <div style={{fontSize:13,fontWeight:800,marginBottom:18}}>Receitas × Despesas — {ano} (extrato)</div>
      <div style={{display:"flex",gap:4,alignItems:"flex-end",height:130}}>
        {meses.map((m,i)=>{const rp=Math.max((m.receitas/maxR)*100,2),dp=Math.max((m.despesas/maxD)*100,2);return(<div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}><div style={{display:"flex",gap:2,alignItems:"flex-end",height:110,width:"100%"}}><div style={{flex:1,background:C.green,borderRadius:"4px 4px 0 0",height:`${rp}%`}}/><div style={{flex:1,background:C.accent,borderRadius:"4px 4px 0 0",height:`${dp}%`}}/></div><div style={{fontSize:8.5,color:C.muted,fontWeight:600}}>{m.nome.slice(0,3).toUpperCase()}</div></div>);})}
      </div>
      <div style={{display:"flex",gap:16,marginTop:10}}>{[[C.green,"Receita"],[C.accent,"Despesa"]].map(([cor,lbl])=>(<div key={lbl} style={{display:"flex",alignItems:"center",gap:6,fontSize:11,color:C.textMid}}><span style={{width:10,height:10,borderRadius:2,background:cor,display:"inline-block"}}/>{lbl}</div>))}</div>
    </Card>
    <Card style={{padding:0}}>
      <STitle>Resumo por Mês</STitle>
      <table><thead><tr><th>Mês</th><th>Receitas</th><th>Despesas</th><th>Resultado</th><th>Progresso</th></tr></thead>
      <tbody>{meses.map((m,i)=>(<tr key={i}><td style={{fontWeight:700}}>{m.nome}</td><td style={{color:C.green,fontFamily:"'DM Mono',monospace",fontWeight:600}}>{fmt(m.receitas)}</td><td style={{color:C.red,fontFamily:"'DM Mono',monospace",fontWeight:600}}>{fmt(m.despesas)}</td><td style={{fontFamily:"'DM Mono',monospace",fontWeight:800,color:m.saldo>=0?C.green:C.red}}>{fmt(m.saldo)}</td><td style={{width:160}}><ProgressBar value={m.despesas} max={m.receitas||1}/></td></tr>))}</tbody>
      </table>
    </Card>
  </div>);
}

// ── TAB MENSAL — usa apenas extrato, com subcategorias expansíveis ──────────
function TabMensal({extrato,orcamentos,categorias,mesSel,setMesSel,ano}){
  const orc=orcamentos.data,upd=orcamentos.update;
  const{start,end}=getCiclo(mesSel,ano);
  const todas=semTransf(extrato.filter(e=>dateInCiclo(e.data,mesSel,ano)));
  const catD=categorias.filter(c=>c.tipo==="despesa");
  const catR=categorias.filter(c=>c.tipo==="receita");
  const[expanded,setExpanded]=useState({});
  const toggleExp=id=>setExpanded(p=>({...p,[id]:!p[id]}));
  // total por categoria (soma subcategorias + sem subcategoria)
  const realPorCat=id=>todas.filter(e=>e.categoriaId===id).reduce((s,e)=>s+Math.abs(e.valor),0);
  // total por subcategoria
  const realPorSub=(catId,subId)=>todas.filter(e=>e.categoriaId===catId&&e.subcategoriaId===subId).reduce((s,e)=>s+Math.abs(e.valor),0);
  const realSemSub=catId=>todas.filter(e=>e.categoriaId===catId&&!e.subcategoriaId).reduce((s,e)=>s+Math.abs(e.valor),0);
  const totalPrev=catD.reduce((s,c)=>s+(orc[`${mesSel}_${ano}_${c.id}`]||0),0);
  const totalReal=catD.reduce((s,c)=>s+realPorCat(c.id),0);
  const totalRec=catR.reduce((s,c)=>s+realPorCat(c.id),0);
  const OrcInput=({orcKey,prev})=>(<input type="number" value={prev||""} placeholder="—" onChange={e=>upd(orcKey,parseFloat(e.target.value)||0)} style={{background:C.surfaceAlt,border:`1.5px solid ${C.border}`,borderRadius:8,color:C.text,padding:"4px 8px",fontSize:12,width:100,fontFamily:"'DM Mono',monospace",outline:"none",fontWeight:600}}/>);

  const CatRows=({cats,tipo})=>cats.map(c=>{
    const key=`${mesSel}_${ano}_${c.id}`,prev=orc[key]||0,real=realPorCat(c.id);
    const diff=tipo==="despesa"?prev-real:real-prev;
    const subs=c.subcategorias||[];
    const hasSubs=subs.length>0;
    const isOpen=expanded[c.id];
    const semSub=realSemSub(c.id);
    return(<React.Fragment key={c.id}>
      <tr style={{cursor:hasSubs?"pointer":"default"}} onClick={hasSubs?()=>toggleExp(c.id):undefined}>
        <td><div style={{display:"flex",alignItems:"center",gap:8}}>
          <span style={{width:9,height:9,borderRadius:"50%",background:c.cor,display:"inline-block",flexShrink:0}}/>
          <span style={{fontWeight:700}}>{c.nome}</span>
          {hasSubs&&<span style={{fontSize:10,color:C.muted,marginLeft:2}}>{isOpen?"▲":"▼"} {subs.length}</span>}
        </div></td>
        <td>{tipo==="despesa"&&<OrcInput orcKey={key} prev={prev}/>}</td>
        <td style={{fontFamily:"'DM Mono',monospace",fontWeight:700,color:tipo==="despesa"?C.red:C.green}}>{fmt(real)}</td>
        <td style={{fontFamily:"'DM Mono',monospace",fontWeight:800,color:diff>=0?C.green:C.red}}>{fmt(diff)}</td>
        {tipo==="despesa"&&<td style={{width:140}}><ProgressBar value={real} max={prev||1} color={c.cor}/></td>}
      </tr>
      {hasSubs&&isOpen&&(<React.Fragment>
        {subs.map(s=>{const sr=realPorSub(c.id,s.id);return(<tr key={s.id} style={{background:C.surfaceAlt}}>
          <td><div style={{display:"flex",alignItems:"center",gap:8,paddingLeft:22}}>
            <span style={{width:5,height:5,borderRadius:"50%",background:c.cor+"88",display:"inline-block"}}/>
            <span style={{fontSize:12,color:C.textMid}}>{s.nome}</span>
          </div></td>
          <td></td>
          <td style={{fontFamily:"'DM Mono',monospace",fontSize:12,color:tipo==="despesa"?C.red:C.green}}>{fmt(sr)}</td>
          <td style={{fontSize:11,color:C.muted,fontFamily:"'DM Mono',monospace"}}>{real>0?((sr/real)*100).toFixed(0):0}%</td>
          {tipo==="despesa"&&<td><ProgressBar value={sr} max={real||1} color={c.cor}/></td>}
        </tr>);})}
        {semSub>0&&(<tr style={{background:C.surfaceAlt}}>
          <td><div style={{paddingLeft:22,fontSize:12,color:C.muted,fontStyle:"italic"}}>Sem subcategoria</div></td>
          <td></td>
          <td style={{fontFamily:"'DM Mono',monospace",fontSize:12,color:C.muted}}>{fmt(semSub)}</td>
          <td></td>
          {tipo==="despesa"&&<td></td>}
        </tr>)}
      </React.Fragment>)}
    </React.Fragment>);
  });

  return(<div style={{display:"flex",flexDirection:"column",gap:20}}>
    <div style={{display:"flex",alignItems:"center",gap:14,flexWrap:"wrap"}}>
      <Sel value={mesSel} onChange={v=>setMesSel(Number(v))} options={MONTHS.map((m,i)=>({value:i,label:m}))} style={{minWidth:160}}/>
      <div style={{fontSize:12,color:C.muted,fontWeight:600,background:C.accentPale,padding:"6px 12px",borderRadius:8,border:`1px solid ${C.border}`}}>📅 Ciclo conta: {fmtDate(start.toISOString().split("T")[0])} → {fmtDate(end.toISOString().split("T")[0])}</div>
    </div>
    <div style={{display:"flex",gap:14,flexWrap:"wrap"}}>
      <KPI icon="🌱" label="Receita Real" value={fmt(totalRec)} color={C.green}/>
      <KPI icon="📋" label="Despesa Prevista" value={fmt(totalPrev)} color={C.yellow}/>
      <KPI icon="💸" label="Despesa Real" value={fmt(totalReal)} color={C.red}/>
      <KPI icon="✨" label="Diferença" value={fmt(totalPrev-totalReal)} color={totalReal<=totalPrev?C.green:C.red} sub={totalReal<=totalPrev?"dentro do orçamento ✓":"acima do orçamento ✗"}/>
    </div>
    <Card style={{padding:0}}><STitle right={<span style={{fontSize:11,color:C.muted,fontWeight:500}}>clique na categoria para expandir</span>}>🌸 Despesas por Categoria</STitle>
      <table><thead><tr><th>Categoria</th><th>Previsto</th><th>Real</th><th>Diferença</th><th>Progresso</th></tr></thead>
      <tbody>
        {catD.length===0&&<tr><td colSpan={5} style={{textAlign:"center",color:C.muted,padding:28}}>Cadastre categorias na aba Cadastro.</td></tr>}
        <CatRows cats={catD} tipo="despesa"/>
      </tbody></table>
    </Card>
    <Card style={{padding:0}}><STitle right={<span style={{fontSize:11,color:C.muted,fontWeight:500}}>clique na categoria para expandir</span>}>🌱 Receitas por Categoria</STitle>
      <table><thead><tr><th>Categoria</th><th></th><th>Real</th><th>Diferença</th></tr></thead>
      <tbody>
        {catR.length===0&&<tr><td colSpan={4} style={{textAlign:"center",color:C.muted,padding:28}}>Cadastre categorias de receita.</td></tr>}
        <CatRows cats={catR} tipo="receita"/>
      </tbody></table>
    </Card>
  </div>);
}

function CsvImportBox({titulo,dica,placeholder,onImport,onClose,extra}){
  const[csv,setCsv]=useState("");
  const linhas=csv.trim().split("\n").filter(Boolean).length;
  return(<Card style={{background:C.accentPale,border:`1.5px solid ${C.accentLight}`}}>
    <div style={{fontSize:13,fontWeight:800,marginBottom:4}}>{titulo}</div>
    <div style={{fontSize:12,color:C.textMid,marginBottom:10}}>{dica}</div>
    {extra}
    <textarea rows={5} value={csv} onChange={e=>setCsv(e.target.value)} placeholder={placeholder}/>
    <div style={{display:"flex",gap:8,marginTop:10}}>
      <Btn onClick={()=>{if(onImport(csv))setCsv("");}} disabled={!csv.trim()} variant="success">Importar {linhas>0?`${linhas} linha${linhas>1?"s":""}`:""}</Btn>
      <Btn onClick={onClose} variant="ghost">Fechar</Btn>
    </div>
  </Card>);
}

// ── TAB EXTRATO — com filtro por banco e suporte a transferência ─────────────
function TabExtrato({extrato,setExtrato,categorias,bancos,calcSaldoBanco}){
  const anoAtual=new Date().getFullYear();
  const[showImp,setShowImp]=useState(false);
  const[filterBanco,setFilterBanco]=useState("");
  const[filterMes,setFilterMes]=useState("");
  const[filterAno,setFilterAno]=useState(String(anoAtual));
  const[filterCat,setFilterCat]=useState("");
  const[impBanco,setImpBanco]=useState("");
  const[msg,setMsg]=useState("");

  const handleImport=(csv)=>{
    const novos=parseCSVLines(csv).map(e=>({...e,bancoId:impBanco,transferenciaParaId:""}));
    if(!novos.length){setMsg("⚠️ Nenhuma linha reconhecida.");return false;}
    setExtrato(p=>[...p,...novos]);
    setMsg(`✅ ${novos.length} lançamentos importados!`);
    setShowImp(false);
    return true;
  };

  const upd=(id,f,v)=>setExtrato(p=>p.map(e=>e.id===id?{...e,[f]:f==="valor"?parseFloat(v)||0:v}:e));
  const rem=id=>setExtrato(p=>p.filter(e=>e.id!==id));
  const add=()=>setExtrato(p=>[...p,{id:Date.now(),data:new Date().toISOString().split("T")[0],descricao:"",valor:0,categoriaId:"",bancoId:filterBanco||"",transferenciaParaId:""}]);

  const filtered=useMemo(()=>{
    let f=extrato;
    if(filterBanco)f=f.filter(e=>e.bancoId===filterBanco);
    if(filterMes!=="")f=f.filter(e=>{
      if(!e.data)return false;
      const d=new Date(e.data+"T12:00:00");
      return d.getMonth()===Number(filterMes)&&String(d.getFullYear())===filterAno;
    });
    if(filterCat==="transf")f=f.filter(e=>e.categoriaId===CAT_TRANSF);
    else if(filterCat)f=f.filter(e=>e.categoriaId===filterCat);
    return f;
  },[extrato,filterBanco,filterMes,filterAno,filterCat]);

  const catOpts=categorias.map(c=>({value:c.id,label:`${c.tipo==="receita"?"↑":"↓"} ${c.nome}`}));
  const bancoOpts=bancos.map(b=>({value:b.id,label:`${b.nome} — ${b.banco}`}));

  return(<div style={{display:"flex",flexDirection:"column",gap:16}}>
    <div style={{display:"flex",gap:10,flexWrap:"wrap",alignItems:"flex-end"}}>
      <Btn onClick={()=>{setShowImp(!showImp);setMsg("");}}>📥 Importar CSV</Btn>
      <Btn onClick={add} variant="ghost">+ Linha manual</Btn>
      <Sel value={filterBanco} onChange={setFilterBanco} options={bancoOpts} placeholder="Todos os bancos" style={{minWidth:180}}/>
      <Sel value={filterMes} onChange={setFilterMes} options={MONTHS.map((m,i)=>({value:String(i),label:m}))} placeholder="Todos os meses" style={{minWidth:150}}/>
      {filterMes!==""&&<Sel value={filterAno} onChange={setFilterAno} options={[anoAtual-1,anoAtual,anoAtual+1].map(a=>({value:String(a),label:String(a)}))} style={{minWidth:90}}/>}
      <Sel value={filterCat} onChange={setFilterCat} options={[{value:"transf",label:"↔ Transferências"},...catOpts]} placeholder="Todas as categorias" style={{minWidth:200}}/>
      {(filterBanco||filterMes!==""||filterCat)&&<Btn onClick={()=>{setFilterBanco("");setFilterMes("");setFilterCat("");}} variant="ghost" style={{fontSize:11}}>✕ limpar filtros</Btn>}
    </div>
    {msg&&<div style={{fontSize:12,padding:"8px 12px",borderRadius:8,fontWeight:600,background:msg.startsWith("✅")?C.greenPale:C.redPale,color:msg.startsWith("✅")?C.green:C.red}}>{msg}</div>}
    {bancos.length>0&&(<div style={{display:"flex",gap:12,flexWrap:"wrap"}}>{bancos.map(b=>{const bc=BANK_COLORS[b.banco]||C.accent;const sal=calcSaldoBanco[b.id]||0;return(<div key={b.id} style={{background:C.surface,border:`1.5px solid ${C.border}`,borderRadius:14,padding:"14px 18px",flex:1,minWidth:160,position:"relative",overflow:"hidden"}}><div style={{position:"absolute",top:0,left:0,right:0,height:4,background:bc}}/><div style={{fontSize:10.5,color:C.muted,fontWeight:700,textTransform:"uppercase",letterSpacing:".07em",marginBottom:2}}>{b.banco}</div><div style={{fontSize:12,fontWeight:800,marginBottom:4,color:C.textMid}}>{b.nome}</div><div style={{fontSize:9,color:C.muted,marginBottom:2}}>Inicial ({b.dataInicial?new Date(b.dataInicial+"T12:00:00").toLocaleDateString("pt-BR"):"—"}): {fmt(b.saldoInicial||0)}</div><div style={{fontSize:18,fontFamily:"'DM Mono',monospace",fontWeight:800,color:sal>=0?C.green:C.red}}>{fmt(sal)}</div></div>);})}</div>)}
    {showImp&&<CsvImportBox
      titulo="📥 Importar Extrato Bancário (CSV)"
      dica="Cole o CSV do seu banco. Separador ; ou , — detectado automaticamente."
      placeholder={"01/06/2026;Supermercado;-350,00\n15/06/2026;Salário;5000,00"}
      onImport={handleImport}
      onClose={()=>setShowImp(false)}
      extra={<div style={{marginBottom:14}}><Sel label="Banco" value={impBanco} onChange={setImpBanco} options={bancoOpts} placeholder="Selecione o banco" style={{minWidth:220}}/></div>}
    />}
    <Card style={{padding:0}}>
      <STitle right={<Badge color={C.accent}>{filtered.length} lançamentos</Badge>}>Extrato da Conta</STitle>
      <div style={{overflowX:"auto"}}><table><thead><tr><th>Data</th><th>Descrição</th><th>Valor</th><th>Banco</th><th>Categoria</th><th>Transfere para</th><th></th></tr></thead>
      <tbody>
        {filtered.length===0&&<tr><td colSpan={7} style={{textAlign:"center",color:C.muted,padding:32}}>Importe um CSV ou adicione manualmente.</td></tr>}
        {filtered.map(e=>{
          const banco=bancos.find(b=>b.id===e.bancoId);
          const bc=BANK_COLORS[banco?.banco]||C.accent;
          const isTransf=e.categoriaId===CAT_TRANSF;
          return(<tr key={e.id} style={{background:isTransf?C.bluePale:""}}>
            <td><input type="date" value={e.data||""} onChange={ev=>upd(e.id,"data",ev.target.value)} style={{background:"transparent",border:"none",color:C.text,fontSize:13,cursor:"pointer"}}/></td>
            <td><input value={e.descricao} onChange={ev=>upd(e.id,"descricao",ev.target.value)} style={{background:"transparent",border:"none",color:C.text,fontSize:13,width:"100%",outline:"none",fontWeight:500}}/></td>
            <td><input type="number" value={e.valor} onChange={ev=>upd(e.id,"valor",ev.target.value)} style={{background:"transparent",border:"none",outline:"none",color:e.valor>=0?C.green:C.red,fontSize:13,fontFamily:"'DM Mono',monospace",fontWeight:700,width:110}}/></td>
            <td>{banco?<Badge color={bc}>{banco.nome}</Badge>:<select value={e.bancoId||""} onChange={ev=>upd(e.id,"bancoId",ev.target.value)} style={{background:C.surfaceAlt,border:`1.5px solid ${C.border}`,borderRadius:8,color:C.muted,padding:"3px 8px",fontSize:12,outline:"none"}}><option value="">— banco —</option>{bancos.map(b=><option key={b.id} value={b.id}>{b.nome}</option>)}</select>}</td>
            <td><CatSelect catId={e.categoriaId} subId={e.subcategoriaId||""} onCat={v=>upd(e.id,"categoriaId",v)} onSub={v=>upd(e.id,"subcategoriaId",v)} categorias={categorias}/></td>
            <td>{isTransf?(<select value={e.transferenciaParaId||""} onChange={ev=>upd(e.id,"transferenciaParaId",ev.target.value)} style={{background:C.bluePale,border:`1.5px solid ${C.blue}55`,borderRadius:8,color:C.blue,padding:"3px 8px",fontSize:12,outline:"none",fontWeight:600}}><option value="">— destino —</option>{bancos.filter(b=>b.id!==e.bancoId).map(b=><option key={b.id} value={b.id}>{b.nome}</option>)}</select>):(<span style={{color:C.muted,fontSize:12}}>—</span>)}</td>
            <td><button onClick={()=>rem(e.id)} style={{background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:15}}>✕</button></td>
          </tr>);
        })}
      </tbody></table></div>
    </Card>
  </div>);
}

// ── TAB CARTÃO — com resumo por categoria ────────────────────────────────────
function TabCartao({fatura,setFatura,categorias,cartoes,setCartoes}){
  const anoAtual=new Date().getFullYear();
  const[mesSel,setMesSel]=useState(new Date().getMonth());
  const[anoSel,setAnoSel]=useState(anoAtual);
  const[verTodos,setVerTodos]=useState(false);
  const[cartaoSel,setCartaoSel]=useState("todos");
  const[showNovo,setShowNovo]=useState(false);
  const[nomeC,setNomeC]=useState("");
  const[bancoC,setBancoC]=useState("Nubank");
  const[showImp,setShowImp]=useState(false);
  const[impCartao,setImpCartao]=useState("");
  const[impMes,setImpMes]=useState(new Date().getMonth());
  const[impAno,setImpAno]=useState(anoAtual);
  const[msg,setMsg]=useState("");

  const handleImport=(csv)=>{
    if(!impCartao){setMsg("⚠️ Selecione o cartão antes de importar.");return false;}
    const novos=parseCSVLines(csv).map(e=>({...e,valor:-Math.abs(e.valor),cartaoId:impCartao,mes_fatura:impMes,ano_fatura:impAno}));
    if(!novos.length){setMsg("⚠️ Nenhuma linha reconhecida.");return false;}
    setFatura(p=>[...p,...novos]);
    setMsg(`✅ ${novos.length} lançamentos importados para ${MONTHS[impMes]}/${impAno}!`);
    setShowImp(false);
    return true;
  };

  const addCartao=()=>{if(!nomeC.trim())return;setCartoes(p=>[...p,{id:Date.now().toString(),nome:nomeC.trim(),banco:bancoC}]);setNomeC("");setShowNovo(false);};
  const remCartao=id=>{setCartoes(p=>p.filter(c=>c.id!==id));setFatura(p=>p.filter(e=>e.cartaoId!==id));};
  const upd=(id,f,v)=>setFatura(p=>p.map(e=>e.id===id?{...e,[f]:f==="valor"?parseFloat(v)||0:v}:e));
  const rem=id=>setFatura(p=>p.filter(e=>e.id!==id));
  const add=()=>setFatura(p=>[...p,{id:Date.now(),data:new Date().toISOString().split("T")[0],descricao:"",valor:0,categoriaId:"",cartaoId:cartaoSel!=="todos"?cartaoSel:"",mes_fatura:mesSel,ano_fatura:anoSel}]);
  const anos=Array.from({length:3},(_,i)=>anoAtual-1+i);
  const fatFiltrada=useMemo(()=>{let f=verTodos?fatura:fatura.filter(e=>e.mes_fatura===mesSel&&e.ano_fatura===anoSel);if(cartaoSel!=="todos")f=f.filter(e=>e.cartaoId===cartaoSel);return f;},[fatura,cartaoSel,mesSel,anoSel,verTodos]);
  const totalFat=fatFiltrada.reduce((s,e)=>s+Math.abs(e.valor),0);
  const semCat=fatFiltrada.filter(e=>!e.categoriaId).length;
  const resumoCartoes=cartoes.map(c=>{const linhas=(verTodos?fatura:fatura.filter(e=>e.mes_fatura===mesSel&&e.ano_fatura===anoSel)).filter(e=>e.cartaoId===c.id);return{...c,total:linhas.reduce((s,e)=>s+Math.abs(e.valor),0),qtd:linhas.length};});

  // Resumo por categoria + subcategoria da fatura filtrada
  const resumoCat=useMemo(()=>{
    const mapa={};
    fatFiltrada.forEach(e=>{
      const cat=categorias.find(c=>c.id===e.categoriaId);
      const key=e.categoriaId||"__sem__";
      const label=cat?cat.nome:"Sem categoria";
      const cor=cat?cat.cor:C.muted;
      const subs=cat?.subcategorias||[];
      if(!mapa[key])mapa[key]={label,cor,total:0,qtd:0,subs:{},subcategorias:subs};
      mapa[key].total+=Math.abs(e.valor);
      mapa[key].qtd++;
      if(e.subcategoriaId){
        const sub=subs.find(s=>s.id===e.subcategoriaId);
        const sk=e.subcategoriaId;
        if(!mapa[key].subs[sk])mapa[key].subs[sk]={label:sub?sub.nome:e.subcategoriaId,total:0,qtd:0};
        mapa[key].subs[sk].total+=Math.abs(e.valor);
        mapa[key].subs[sk].qtd++;
      }
    });
    return Object.values(mapa).sort((a,b)=>b.total-a.total);
  },[fatFiltrada,categorias]);
  const[catExpanded,setCatExpanded]=useState({});
  const toggleCatExp=id=>setCatExpanded(p=>({...p,[id]:!p[id]}));

  return(<div style={{display:"flex",flexDirection:"column",gap:16}}>
    <div style={{display:"flex",gap:10,flexWrap:"wrap",alignItems:"flex-end"}}>
      <div style={{display:"flex",background:C.surfaceAlt,borderRadius:10,border:`1.5px solid ${C.border}`,overflow:"hidden"}}>{[false,true].map(v=>(<button key={String(v)} onClick={()=>setVerTodos(v)} style={{padding:"8px 16px",border:"none",fontSize:13,fontWeight:700,cursor:"pointer",background:verTodos===v?C.accent:"transparent",color:verTodos===v?C.white:C.muted}}>{v?"Todos":"Por Fatura"}</button>))}</div>
      {!verTodos&&<><Sel value={mesSel} onChange={v=>setMesSel(Number(v))} options={MONTHS.map((m,i)=>({value:i,label:m}))} style={{minWidth:140}}/><Sel value={anoSel} onChange={v=>setAnoSel(Number(v))} options={anos.map(a=>({value:a,label:String(a)}))} style={{minWidth:90}}/></>}
      <Sel value={cartaoSel} onChange={setCartaoSel} options={[{value:"todos",label:"Todos os cartões"},...cartoes.map(c=>({value:c.id,label:`${c.nome} — ${c.banco}`}))]} style={{minWidth:200}}/>
      <Btn onClick={()=>{setShowImp(!showImp);setMsg("");}}>📥 Importar CSV</Btn>
      <Btn onClick={add} variant="ghost">+ Linha manual</Btn>
      <Btn onClick={()=>setShowNovo(!showNovo)} variant="soft">+ Novo cartão</Btn>
    </div>
    {showNovo&&(<Card style={{background:C.accentPale,border:`1.5px solid ${C.accentLight}`}}><div style={{fontSize:13,fontWeight:800,marginBottom:12}}>💳 Cadastrar Novo Cartão</div><div style={{display:"flex",gap:10,flexWrap:"wrap",alignItems:"flex-end"}}><Inp label="Nome do cartão" value={nomeC} onChange={setNomeC} placeholder="Ex: Nubank Principal" style={{flex:1,minWidth:160}}/><Sel label="Banco" value={bancoC} onChange={setBancoC} options={BANKS.map(b=>({value:b,label:b}))} style={{minWidth:150}}/><Btn onClick={addCartao}>Cadastrar</Btn><Btn onClick={()=>setShowNovo(false)} variant="ghost">Cancelar</Btn></div></Card>)}
    {msg&&<div style={{fontSize:12,padding:"8px 12px",borderRadius:8,fontWeight:600,background:msg.startsWith("✅")?C.greenPale:C.redPale,color:msg.startsWith("✅")?C.green:C.red}}>{msg}</div>}
    {showImp&&<CsvImportBox
      titulo="📥 Importar Fatura do Cartão (CSV)"
      dica="Cole o CSV da fatura. O mês é definido abaixo — não pela data dos lançamentos."
      placeholder={"01/06,iFood,-89.90\n03/06,Uber,-32.50\n10/06,Amazon 1/3,-150.00"}
      onImport={handleImport}
      onClose={()=>setShowImp(false)}
      extra={<div style={{display:"flex",gap:12,flexWrap:"wrap",alignItems:"flex-end",marginBottom:14}}>
        <Sel label="Cartão" value={impCartao} onChange={setImpCartao} options={cartoes.map(c=>({value:c.id,label:`${c.nome} — ${c.banco}`}))} placeholder="Selecione o cartão" style={{minWidth:200}}/>
        <Sel label="Mês da Fatura" value={impMes} onChange={v=>setImpMes(Number(v))} options={MONTHS.map((m,i)=>({value:i,label:m}))} style={{minWidth:150}}/>
        <Sel label="Ano" value={impAno} onChange={v=>setImpAno(Number(v))} options={anos.map(a=>({value:a,label:String(a)}))} style={{minWidth:90}}/>
      </div>}
    />}
    {cartoes.length===0&&(<Card style={{background:C.accentPale,border:`1.5px solid ${C.accentLight}`,textAlign:"center",padding:40}}><div style={{fontSize:32,marginBottom:8}}>💳</div><div style={{fontSize:13,fontWeight:700,color:C.textMid,marginBottom:4}}>Nenhum cartão cadastrado</div><div style={{fontSize:12,color:C.muted}}>Clique em "+ Novo cartão" para começar.</div></Card>)}

    <div style={{display:"flex",gap:14,flexWrap:"wrap"}}>
      <KPI icon="💸" label={verTodos?"Total Geral":`Fatura ${MONTHS[mesSel]}/${anoSel}`} value={fmt(totalFat)} color={C.red}/>
      <KPI icon="🏷️" label="Sem categoria" value={semCat} color={semCat>0?C.yellow:C.green} sub={semCat>0?`${semCat} para categorizar`:"tudo categorizado ✓"}/>
    </div>

    {cartoes.length>0&&(<div style={{display:"flex",gap:12,flexWrap:"wrap"}}>{resumoCartoes.map(c=>{const bc=BANK_COLORS[c.banco]||C.accent;return(<div key={c.id} style={{background:C.surface,border:`1.5px solid ${C.border}`,borderRadius:14,padding:"14px 18px",flex:1,minWidth:160,position:"relative",overflow:"hidden"}}><div style={{position:"absolute",top:0,left:0,right:0,height:4,background:bc}}/><div style={{fontSize:10.5,color:C.muted,fontWeight:700,textTransform:"uppercase",letterSpacing:".07em",marginBottom:4}}>{c.banco}</div><div style={{fontSize:13,fontWeight:800,marginBottom:6}}>{c.nome}</div><div style={{fontSize:20,fontFamily:"'DM Mono',monospace",fontWeight:800,color:C.red}}>{fmt(c.total)}</div><div style={{fontSize:11,color:C.muted,marginTop:3}}>{c.qtd} lançamentos</div><button onClick={()=>remCartao(c.id)} style={{position:"absolute",top:10,right:10,background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:13}}>✕</button></div>);})}</div>)}

    {resumoCat.length>0&&(<Card style={{padding:0}}><STitle right={<span style={{fontSize:11,color:C.muted,fontWeight:500}}>clique para expandir</span>}>🏷️ Gastos por Categoria</STitle>
      <table><thead><tr><th>Categoria</th><th>Total</th><th>Qtd</th><th>%</th><th>Barra</th></tr></thead>
      <tbody>{resumoCat.map((c,i)=>{
        const subList=Object.entries(c.subs||{});
        const hasS=subList.length>0;
        const isOpen=catExpanded[i];
        return(<React.Fragment key={i}>
          <tr style={{cursor:hasS?"pointer":"default"}} onClick={hasS?()=>toggleCatExp(i):undefined}>
            <td><div style={{display:"flex",alignItems:"center",gap:8}}>
              <span style={{width:9,height:9,borderRadius:"50%",background:c.cor,display:"inline-block"}}/>
              <span style={{fontWeight:700}}>{c.label}</span>
              {hasS&&<span style={{fontSize:10,color:C.muted}}>{isOpen?"▲":"▼"}</span>}
            </div></td>
            <td style={{fontFamily:"'DM Mono',monospace",fontWeight:700,color:C.red}}>{fmt(c.total)}</td>
            <td style={{color:C.muted}}>{c.qtd}</td>
            <td style={{color:C.muted,fontFamily:"'DM Mono',monospace"}}>{totalFat>0?((c.total/totalFat)*100).toFixed(1):0}%</td>
            <td style={{width:140}}><ProgressBar value={c.total} max={totalFat||1} color={c.cor}/></td>
          </tr>
          {hasS&&isOpen&&subList.map(([sk,sv])=>(<tr key={sk} style={{background:C.surfaceAlt}}>
            <td><div style={{paddingLeft:22,display:"flex",alignItems:"center",gap:6}}>
              <span style={{width:5,height:5,borderRadius:"50%",background:c.cor+"88",display:"inline-block"}}/>
              <span style={{fontSize:12,color:C.textMid}}>{sv.label}</span>
            </div></td>
            <td style={{fontFamily:"'DM Mono',monospace",fontSize:12,color:C.red}}>{fmt(sv.total)}</td>
            <td style={{fontSize:12,color:C.muted}}>{sv.qtd}</td>
            <td style={{fontSize:12,color:C.muted,fontFamily:"'DM Mono',monospace"}}>{c.total>0?((sv.total/c.total)*100).toFixed(0):0}%</td>
            <td><ProgressBar value={sv.total} max={c.total||1} color={c.cor}/></td>
          </tr>))}
        </React.Fragment>);
      })}</tbody>
      </table>
    </Card>)}

    <Card style={{padding:0}}>
      <STitle right={<Badge color={C.accent}>{fatFiltrada.length} lançamentos</Badge>}>{verTodos?"Todos os lançamentos":`Fatura ${MONTHS[mesSel]}/${anoSel}`}</STitle>
      <div style={{overflowX:"auto"}}><table><thead><tr><th>Data</th><th>Descrição</th><th>Valor</th><th>Cartão</th><th>Fatura</th><th>Categoria</th><th></th></tr></thead>
      <tbody>
        {fatFiltrada.length===0&&<tr><td colSpan={7} style={{textAlign:"center",color:C.muted,padding:32}}>Nenhum lançamento. Importe um CSV ou adicione manualmente.</td></tr>}
        {fatFiltrada.map(e=>{const cart=cartoes.find(c=>c.id===e.cartaoId);const bc=BANK_COLORS[cart?.banco]||C.accent;return(<tr key={e.id}><td><input type="date" value={e.data||""} onChange={ev=>upd(e.id,"data",ev.target.value)} style={{background:"transparent",border:"none",color:C.text,fontSize:13,cursor:"pointer"}}/></td><td><input value={e.descricao} onChange={ev=>upd(e.id,"descricao",ev.target.value)} style={{background:"transparent",border:"none",color:C.text,fontSize:13,width:"100%",outline:"none",fontWeight:500}}/></td><td><input type="number" value={e.valor} onChange={ev=>upd(e.id,"valor",ev.target.value)} style={{background:"transparent",border:"none",color:C.red,fontSize:13,fontFamily:"'DM Mono',monospace",fontWeight:700,width:110,outline:"none"}}/></td><td>{cart?<Badge color={bc}>{cart.nome}</Badge>:<select value={e.cartaoId||""} onChange={ev=>upd(e.id,"cartaoId",ev.target.value)} style={{background:C.surfaceAlt,border:`1.5px solid ${C.border}`,borderRadius:8,color:C.muted,padding:"3px 8px",fontSize:12,outline:"none"}}><option value="">— cartão —</option>{cartoes.map(c=><option key={c.id} value={c.id}>{c.nome}</option>)}</select>}</td><td style={{fontSize:11,color:C.purple,fontWeight:700,whiteSpace:"nowrap"}}>{e.mes_fatura!==undefined?`${MONTHS[e.mes_fatura].slice(0,3)}/${e.ano_fatura}`:"—"}</td><td><CatSelect catId={e.categoriaId} subId={e.subcategoriaId||""} onCat={v=>upd(e.id,"categoriaId",v)} onSub={v=>upd(e.id,"subcategoriaId",v)} categorias={categorias} tipoFiltro="despesa"/></td><td><button onClick={()=>rem(e.id)} style={{background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:15}}>✕</button></td></tr>);})}
      </tbody></table></div>
    </Card>
  </div>);
}

function TabCadastro({categorias,setCategorias,bancos,setBancos}){
  const[nome,setNome]=useState(""),[ tipo,setTipo]=useState("despesa"),[cor,setCor]=useState("#D96B8A");
  const[nomeBanco,setNomeBanco]=useState(""),[ bancoBanco,setBancoBanco]=useState("Nubank");
  const[saldoIni,setSaldoIni]=useState(""),[ dataIni,setDataIni]=useState(new Date().toISOString().split("T")[0]);
  const CORES=["#D96B8A","#F4A7BC","#9B7EC8","#5A9E7C","#C9924A","#56CCF2","#D96B6B","#B8969F","#7DBFAD","#E8A598"];
  const addCat=()=>{if(!nome.trim())return;setCategorias(p=>[...p,{id:Date.now().toString(),nome:nome.trim(),tipo,cor}]);setNome("");};
  const remCat=id=>setCategorias(p=>p.filter(c=>c.id!==id));
  const addBanco=()=>{if(!nomeBanco.trim())return;setBancos(p=>[...p,{id:Date.now().toString(),nome:nomeBanco.trim(),banco:bancoBanco,saldoInicial:parseFloat(saldoIni)||0,dataInicial:dataIni}]);setNomeBanco("");setSaldoIni("");};
  const remBanco=id=>setBancos(p=>p.filter(b=>b.id!==id));
  const updBanco=(id,f,v)=>setBancos(p=>p.map(b=>b.id===id?{...b,[f]:f==="saldoInicial"?parseFloat(v)||0:v}:b));
  return(<div style={{display:"flex",flexDirection:"column",gap:20,maxWidth:760}}>
    <Card>
      <div style={{fontSize:14,fontWeight:800,marginBottom:14}}>🏦 Cadastrar Conta Bancária</div>
      <div style={{display:"flex",gap:12,flexWrap:"wrap",alignItems:"flex-end"}}>
        <Inp label="Nome da conta" value={nomeBanco} onChange={setNomeBanco} placeholder="Ex: Nubank Pessoal" style={{flex:2,minWidth:160}}/>
        <Sel label="Banco" value={bancoBanco} onChange={setBancoBanco} options={BANKS.map(b=>({value:b,label:b}))} style={{minWidth:140}}/>
        <Inp label="Saldo inicial (R$)" type="number" value={saldoIni} onChange={setSaldoIni} placeholder="0,00" style={{minWidth:130}}/>
        <Inp label="Data do saldo inicial" type="date" value={dataIni} onChange={setDataIni} style={{minWidth:160}}/>
        <Btn onClick={addBanco}>Adicionar</Btn>
      </div>
      {bancos.length>0&&(<div style={{marginTop:16,display:"flex",flexDirection:"column",gap:10}}>
        {bancos.map(b=>{const bc=BANK_COLORS[b.banco]||C.accent;return(<div key={b.id} style={{border:`1.5px solid ${C.border}`,borderRadius:12,padding:"14px 16px",position:"relative",overflow:"hidden"}}>
          <div style={{position:"absolute",top:0,left:0,bottom:0,width:4,background:bc,borderRadius:"4px 0 0 4px"}}/>
          <div style={{paddingLeft:12}}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10,flexWrap:"wrap"}}>
              <span style={{fontWeight:800,fontSize:13}}>{b.nome}</span><Badge color={bc}>{b.banco}</Badge>
              <button onClick={()=>remBanco(b.id)} style={{background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:12,marginLeft:"auto"}}>✕ remover</button>
            </div>
            <div style={{display:"flex",gap:12,flexWrap:"wrap",alignItems:"flex-end"}}>
              <div style={{display:"flex",flexDirection:"column",gap:4}}>
                <label style={{fontSize:10.5,color:C.muted,fontWeight:700,textTransform:"uppercase",letterSpacing:".07em"}}>Saldo Inicial (R$)</label>
                <input type="number" value={b.saldoInicial||""} placeholder="0,00" onChange={e=>updBanco(b.id,"saldoInicial",e.target.value)} style={{background:C.surfaceAlt,border:`1.5px solid ${C.border}`,borderRadius:8,color:C.text,padding:"6px 10px",fontSize:13,outline:"none",fontFamily:"'DM Mono',monospace",fontWeight:600,width:140}}/>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:4}}>
                <label style={{fontSize:10.5,color:C.muted,fontWeight:700,textTransform:"uppercase",letterSpacing:".07em"}}>Data do Saldo Inicial</label>
                <input type="date" value={b.dataInicial||""} onChange={e=>updBanco(b.id,"dataInicial",e.target.value)} style={{background:C.surfaceAlt,border:`1.5px solid ${C.border}`,borderRadius:8,color:C.text,padding:"6px 10px",fontSize:13,outline:"none"}}/>
              </div>
              <div style={{fontSize:11,color:C.muted,fontWeight:600,paddingBottom:6}}>Saldo atual calculado automaticamente pelo extrato.</div>
            </div>
          </div>
        </div>);})}
      </div>)}
    </Card>
    <Card>
      <div style={{fontSize:14,fontWeight:800,marginBottom:14}}>🏷️ Nova Categoria</div>
      <div style={{display:"flex",gap:12,flexWrap:"wrap",alignItems:"flex-end"}}>
        <Inp label="Nome" value={nome} onChange={setNome} placeholder="Ex: Alimentação" style={{flex:2,minWidth:160}}/>
        <Sel label="Tipo" value={tipo} onChange={setTipo} options={[{value:"despesa",label:"↓ Despesa"},{value:"receita",label:"↑ Receita"}]} style={{flex:1,minWidth:130}}/>
        <div style={{display:"flex",flexDirection:"column",gap:4}}><label style={{fontSize:10.5,color:C.muted,fontWeight:700,textTransform:"uppercase",letterSpacing:".07em"}}>Cor</label><div style={{display:"flex",gap:5,flexWrap:"wrap"}}>{CORES.map(c=><div key={c} onClick={()=>setCor(c)} style={{width:22,height:22,borderRadius:"50%",background:c,cursor:"pointer",border:cor===c?`3px solid ${C.text}`:"3px solid transparent",boxShadow:cor===c?"0 0 0 1.5px white inset":"none"}}/>)}</div></div>
        <Btn onClick={addCat}>Adicionar</Btn>
      </div>
    </Card>
    {["receita","despesa"].map(t=>{
      const cats=categorias.filter(c=>c.tipo===t);
      return(<Card key={t} style={{padding:0}}>
        <STitle right={<Badge color={t==="receita"?C.green:C.red}>{cats.length}</Badge>}>{t==="receita"?"🌱 Categorias de Receita":"🌸 Categorias de Despesa"}</STitle>
        {cats.length===0?<div style={{padding:"16px 18px",color:C.muted,fontSize:13}}>Nenhuma categoria cadastrada.</div>
        :<div>{cats.map(c=>{
          const subs=c.subcategorias||[];
          return(<div key={c.id} style={{borderBottom:`1px solid ${C.borderLight}`}}>
            <div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 16px"}}>
              <span style={{display:"inline-block",width:12,height:12,borderRadius:"50%",background:c.cor,flexShrink:0}}/>
              <span style={{fontWeight:700,flex:1}}>{c.nome}</span>
              <SubcatAdder catId={c.id} setCategorias={setCategorias}/>
              <button onClick={()=>remCat(c.id)} style={{background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:12}}>✕</button>
            </div>
            {subs.length>0&&(<div style={{paddingLeft:36,paddingBottom:8,display:"flex",flexWrap:"wrap",gap:6}}>
              {subs.map(s=>(<span key={s.id} style={{display:"inline-flex",alignItems:"center",gap:5,background:c.cor+"18",border:`1px solid ${c.cor}44`,borderRadius:99,padding:"2px 10px",fontSize:11,color:c.cor,fontWeight:600}}>
                {s.nome}
                <button onClick={()=>setCategorias(p=>p.map(x=>x.id===c.id?{...x,subcategorias:(x.subcategorias||[]).filter(z=>z.id!==s.id)}:x))} style={{background:"none",border:"none",color:c.cor+"88",cursor:"pointer",fontSize:11,padding:0,lineHeight:1}}>✕</button>
              </span>))}
            </div>)}
          </div>);
        })}</div>}
      </Card>);
    })}
  </div>);
}

function SubcatAdder({catId,setCategorias}){
  const[show,setShow]=useState(false);
  const[nome,setNome]=useState("");
  const add=()=>{
    if(!nome.trim())return;
    setCategorias(p=>p.map(c=>c.id===catId?{...c,subcategorias:[...(c.subcategorias||[]),{id:Date.now().toString(),nome:nome.trim()}]}:c));
    setNome("");setShow(false);
  };
  if(!show)return(<button onClick={()=>setShow(true)} style={{background:C.accentPale,border:`1px solid ${C.accentLight}`,borderRadius:8,color:C.accent,cursor:"pointer",fontSize:11,padding:"2px 8px",fontWeight:700}}>+ sub</button>);
  return(<div style={{display:"flex",gap:4,alignItems:"center"}}>
    <input value={nome} onChange={e=>setNome(e.target.value)} onKeyDown={e=>e.key==="Enter"&&add()} placeholder="Nome da subcategoria" autoFocus style={{background:C.surfaceAlt,border:`1.5px solid ${C.accentLight}`,borderRadius:8,padding:"3px 8px",fontSize:12,outline:"none",width:160}}/>
    <button onClick={add} style={{background:C.greenPale,border:`1px solid ${C.green}55`,borderRadius:8,color:C.green,cursor:"pointer",fontSize:11,padding:"3px 8px",fontWeight:700}}>✓</button>
    <button onClick={()=>setShow(false)} style={{background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:12}}>✕</button>
  </div>);
}

const TABS=[{id:"anual",label:"📅 Anual"},{id:"mensal",label:"📊 Mensal"},{id:"extrato",label:"🏦 Extrato"},{id:"cartao",label:"💳 Cartão"},{id:"cadastro",label:"⚙️ Cadastro"}];
const DEFAULT_CATS=[{id:"1",nome:"Salário",tipo:"receita",cor:"#5A9E7C"},{id:"2",nome:"Freelance",tipo:"receita",cor:"#9B7EC8"},{id:"3",nome:"Alimentação",tipo:"despesa",cor:"#C9924A"},{id:"4",nome:"Moradia",tipo:"despesa",cor:"#D96B8A"},{id:"5",nome:"Transporte",tipo:"despesa",cor:"#7DBFAD"},{id:"6",nome:"Saúde",tipo:"despesa",cor:"#D96B6B"},{id:"7",nome:"Lazer",tipo:"despesa",cor:"#B8969F"}];

function App(){
  const[loaded,setLoaded]=useState(false);
  const[syncStatus,setSyncStatus]=useState("carregando");
  const[tab,setTab]=useState("anual");
  const[categorias,setCategorias]=useState(DEFAULT_CATS);
  const[bancos,setBancos]=useState([]);
  const[cartoes,setCartoes]=useState([]);
  const[extrato,setExtrato]=useState([]);
  const[fatura,setFatura]=useState([]);
  const[orcData,setOrcData]=useState({});
  const[mesSel,setMesSel]=useState(new Date().getMonth());

  // Calcula saldo atual de cada banco
  // Regras:
  // - Lançamentos normais: somam diretamente ao banco (valor +/-)
  // - Transferência saindo (categoriaId===CAT_TRANSF, bancoId===X): valor negativo já debita X
  // - Transferência chegando (transferenciaParaId===Y): credita Y com o valor absoluto
  const calcSaldoBanco=useMemo(()=>{
    const map={};
    bancos.forEach(b=>{ map[b.id]=b.saldoInicial||0; });
    extrato.forEach(e=>{
      const dataIni=bancos.find(b=>b.id===e.bancoId)?.dataInicial||"";
      if(dataIni&&e.data&&e.data<dataIni)return;
      // debita do banco de origem (seja transferência ou gasto normal)
      if(e.bancoId&&map[e.bancoId]!==undefined){
        map[e.bancoId]+=e.valor;
      }
      // credita no banco destino quando é transferência
      if(e.categoriaId===CAT_TRANSF&&e.transferenciaParaId&&map[e.transferenciaParaId]!==undefined){
        const dataIniDest=bancos.find(b=>b.id===e.transferenciaParaId)?.dataInicial||"";
        if(!dataIniDest||!e.data||e.data>=dataIniDest){
          map[e.transferenciaParaId]+=Math.abs(e.valor);
        }
      }
    });
    return map;
  },[bancos,extrato]);

  const saldoTotal=Object.values(calcSaldoBanco).reduce((s,v)=>s+v,0);
  const ano=new Date().getFullYear();
  const saveTimer=useRef(null);

  useEffect(()=>{
    loadAll().then(saved=>{
      if(saved){
        if(saved.categorias)setCategorias(saved.categorias);
        if(saved.bancos)setBancos(saved.bancos);
        if(saved.cartoes)setCartoes(saved.cartoes);
        if(saved.extrato)setExtrato(saved.extrato);
        if(saved.fatura)setFatura(saved.fatura);
        if(saved.orcData)setOrcData(saved.orcData);
      }
      setLoaded(true);setSyncStatus("ok");
    }).catch(()=>{setLoaded(true);setSyncStatus("erro");});
  },[]);

  useEffect(()=>{
    if(!loaded)return;
    setSyncStatus("salvando");
    clearTimeout(saveTimer.current);
    saveTimer.current=setTimeout(()=>{
      saveAll({categorias,bancos,cartoes,extrato,fatura,orcData}).then(()=>setSyncStatus("ok")).catch(()=>setSyncStatus("erro"));
    },1200);
  },[categorias,bancos,cartoes,extrato,fatura,orcData,loaded]);

  const orcamentos={data:orcData,update:(k,v)=>setOrcData(p=>({...p,[k]:v}))};
  const semCatExt=extrato.filter(e=>!e.categoriaId).length;
  const semCatFat=fatura.filter(e=>!e.categoriaId).length;
  const syncColors={carregando:{bg:C.purplePale,color:C.purple},ok:{bg:C.greenPale,color:C.green},salvando:{bg:C.yellowPale,color:C.yellow},erro:{bg:C.redPale,color:C.red}};
  const syncLabels={carregando:"⏳ carregando…",ok:"☁️ sincronizado",salvando:"💾 salvando…",erro:"❌ erro ao salvar"};

  if(!loaded)return(<div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16}}><div style={{fontSize:40}}>🌸</div><div style={{fontSize:14,color:C.muted,fontWeight:600}}>Carregando seus dados…</div></div>);

  return(<div style={{minHeight:"100vh",background:C.bg}}>
    <div style={{background:C.white,borderBottom:`1.5px solid ${C.border}`,boxShadow:"0 2px 16px #D96B8A0D",position:"sticky",top:0,zIndex:100}}>
      <div style={{maxWidth:1280,margin:"0 auto",padding:"0 24px",display:"flex",alignItems:"center",gap:20}}>
        <div style={{padding:"14px 0",display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
          <div style={{width:32,height:32,borderRadius:10,background:`linear-gradient(135deg,${C.accent},${C.accentLight})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,boxShadow:`0 2px 8px ${C.accent}44`}}>🌸</div>
          <div><div style={{fontWeight:800,fontSize:14,color:C.text,lineHeight:1.1}}>Meu Financeiro</div><div style={{fontSize:10,color:C.muted,fontWeight:600}}>{ano}</div></div>
        </div>
        <nav style={{display:"flex",flex:1,overflowX:"auto"}}>
          {TABS.map(t=>(<button key={t.id} onClick={()=>setTab(t.id)} style={{background:"none",border:"none",padding:"16px 14px",color:tab===t.id?C.accent:C.muted,borderBottom:`2.5px solid ${tab===t.id?C.accent:"transparent"}`,fontWeight:tab===t.id?800:600,fontSize:13,cursor:"pointer",whiteSpace:"nowrap",display:"flex",alignItems:"center",gap:6}}>
            {t.label}
            {t.id==="extrato"&&semCatExt>0&&<Badge color={C.yellow} bg={C.yellowPale}>{semCatExt}</Badge>}
            {t.id==="cartao"&&semCatFat>0&&<Badge color={C.yellow} bg={C.yellowPale}>{semCatFat}</Badge>}
          </button>))}
        </nav>
        <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4,flexShrink:0}}>
          <div style={{background:saldoTotal>=0?C.greenPale:C.redPale,border:`1.5px solid ${saldoTotal>=0?C.green+"44":C.red+"44"}`,borderRadius:10,padding:"6px 14px",textAlign:"right"}}>
            <div style={{fontSize:9.5,color:C.muted,fontWeight:700,textTransform:"uppercase",letterSpacing:".06em"}}>Saldo Total</div>
            <div style={{fontSize:14,fontFamily:"'DM Mono',monospace",fontWeight:800,color:saldoTotal>=0?C.green:C.red}}>{fmt(saldoTotal)}</div>
          </div>
          <div style={{fontSize:10,fontWeight:700,padding:"2px 8px",borderRadius:6,...syncColors[syncStatus]}}>{syncLabels[syncStatus]}</div>
        </div>
      </div>
    </div>
    <div style={{maxWidth:1280,margin:"0 auto",padding:"24px"}}>
      {tab==="anual"&&<TabAnual extrato={extrato} categorias={categorias} saldoTotal={saldoTotal} calcSaldoBanco={calcSaldoBanco} bancos={bancos} ano={ano}/>}
      {tab==="mensal"&&<TabMensal extrato={extrato} orcamentos={orcamentos} categorias={categorias} mesSel={mesSel} setMesSel={setMesSel} ano={ano}/>}
      {tab==="extrato"&&<TabExtrato extrato={extrato} setExtrato={setExtrato} categorias={categorias} bancos={bancos} calcSaldoBanco={calcSaldoBanco}/>}
      {tab==="cartao"&&<TabCartao fatura={fatura} setFatura={setFatura} categorias={categorias} cartoes={cartoes} setCartoes={setCartoes}/>}
      {tab==="cadastro"&&<TabCadastro categorias={categorias} setCategorias={setCategorias} bancos={bancos} setBancos={setBancos}/>}
    </div>
  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
